name: sneak_tap
description: Sneak-Tap — Virtual Try-On Sneaker E-Commerce App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  go_router: ^14.2.7
  sqflite: ^2.3.3+1
  path: ^1.9.0
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  sqflite_common_ffi_web: ^1.1.1
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.5
  google_mlkit_image_labeling: ^0.12.0
  google_mlkit_text_recognition: ^0.13.0
  camera: ^0.11.2+2
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/shoes/
